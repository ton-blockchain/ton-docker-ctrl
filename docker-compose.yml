services:
  ton-node:
    image: ghcr.io/ton-blockchain/ton-docker-ctrl:${TON_BRANCH:-latest}
    container_name: ton-node
    restart: unless-stopped
    ports:
      - "0.0.0.0:$VALIDATOR_PORT:$VALIDATOR_PORT/udp"
      - "0.0.0.0:$LITESERVER_PORT:$LITESERVER_PORT/tcp"
      - "0.0.0.0:$QUIC_PORT:$QUIC_PORT/udp"
    tty: true
    volumes:
      - ton:/var/ton-work
      - mytoncore:/usr/local/bin/mytoncore
      - ton-src:/usr/src/ton
    environment:
      TON_BRANCH: ${TON_BRANCH}
      NETWORK: ${NETWORK:-mainnet}
      GLOBAL_CONFIG_URL: ${GLOBAL_CONFIG_URL}
      IGNORE_MINIMAL_REQS: ${IGNORE_MINIMAL_REQS}
      MYTONCTRL_VERSION: ${MYTONCTRL_VERSION}
      DUMP: ${DUMP}
      DUMP_VALIDATE_BEFORE_EXTRACT: ${DUMP_VALIDATE_BEFORE_EXTRACT:-false}
      MODE: ${MODE}
      ARCHIVE_TTL: ${ARCHIVE_TTL}
      STATE_TTL: ${STATE_TTL}
      SYNC_BEFORE: ${SYNC_BEFORE}
      VERBOSITY: ${VERBOSITY}
      CUSTOM_PARAMETERS: ${CUSTOM_PARAMETERS:-}
      PUBLIC_IP: ${PUBLIC_IP}
      VALIDATOR_PORT: ${VALIDATOR_PORT}
      LITESERVER_PORT: ${LITESERVER_PORT}
      VALIDATOR_CONSOLE_PORT: ${VALIDATOR_CONSOLE_PORT}
      QUIC_PORT: ${QUIC_PORT}
    logging:
      driver: "json-file"
      options:
        max-size: 100m
        max-file: "3"
volumes:
  ton:
    name: ton-work
  mytoncore:
    name: mytoncore
  ton-src:
    name: ton-src
